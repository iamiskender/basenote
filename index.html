<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="talentapp:project_verification" content="d2b378511f24aff0b4198f3e662c047556ee09b9aff791bde989c2bd23c89ef18f96f52ffce2b83675dde22cffd11c50e82eb9831">
    <title>BaseNote — On-chain Not Defteri</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0a0a0f;
            --bg2: #111118;
            --bg3: #1a1a24;
            --border: rgba(255,255,255,0.08);
            --border2: rgba(255,255,255,0.14);
            --accent: #6c63ff;
            --accent2: #a78bfa;
            --text: #e8e8f0;
            --muted: #666680;
            --muted2: #9898b0;
            --green: #34d399;
            --red: #f87171;
            --mono: 'Space Mono', monospace;
            --sans: 'DM Sans', sans-serif;
        }
        body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; font-size: 15px; }
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image: linear-gradient(rgba(108,99,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(108,99,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px; pointer-events: none; z-index: 0;
        }
        .wrap { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; padding: 48px 20px 80px; }
        .header { margin-bottom: 40px; }
        .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .logo-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 14px; font-weight: 700; color: #fff; }
        .logo-text { font-family: var(--mono); font-size: 18px; font-weight: 700; color: var(--text); }
        .logo-text span { color: var(--accent2); }
        .tagline { font-size: 13px; color: var(--muted); font-family: var(--mono); }
        .connect-bar { display: flex; align-items: center; justify-content: space-between; background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; margin-bottom: 24px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); margin-right: 8px; }
        .status-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }
        .btn { font-family: var(--sans); font-size: 13px; font-weight: 500; padding: 8px 18px; border-radius: 8px; border: none; cursor: pointer; transition: all 0.15s; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-ghost { background: transparent; color: var(--muted2); border: 1px solid var(--border2); }
        .composer { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 24px; }
        textarea { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 14px; color: var(--text); font-family: var(--sans); min-height: 100px; outline: none; }
        .toast { position: fixed; bottom: 24px; right: 24px; background: var(--bg3); border: 1px solid var(--border2); padding: 14px 18px; border-radius: 12px; transform: translateY(100px); transition: all 0.3s; z-index: 100; }
        .toast.show { transform: translateY(0); }
        .note-card { background: var(--bg2); border: 1px solid var(--border); padding: 18px 20px; border-radius: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="header">
        <div class="logo"><div class="logo-icon">Bn</div><div class="logo-text">Base<span>Note</span></div></div>
        <div class="tagline">// on-chain not defteri · base network</div>
    </div>
    <div class="connect-bar">
        <div style="display:flex; align-items:center;">
            <div class="status-dot" id="statusDot"></div>
            <div id="walletAddr" style="font-family:var(--mono); font-size:12px;">Cüzdan bağlı değil</div>
        </div>
        <button class="btn btn-primary" id="connectBtn" onclick="connectWallet()">Cüzdanı Bağla</button>
    </div>
    <div class="composer">
        <textarea id="noteInput" placeholder="Notunu yaz..." disabled></textarea>
        <button class="btn btn-primary" id="saveBtn" style="margin-top:10px;" onclick="saveNote()" disabled>Blockchain'e Kaydet</button>
    </div>
    <div id="notesList"></div>
</div>
<div class="toast" id="toast"></div>

<script>
    const CONTRACT_ADDRESS = "0xC447dA13AF0e252aa28ef8b58ff8440dC6B151e3";
    const ABI = ["function addNote(string calldata content) external", "function getNotes() external view returns (tuple(string content, uint256 timestamp)[])"];
    let provider, signer, contract;

    async function connectWallet() {
        if (!window.ethereum) return alert("MetaMask gerekli!");
        await window.ethereum.request({ method: 'eth_requestAccounts' });
        provider = new ethers.providers.Web3Provider(window.ethereum);
        signer = provider.getSigner();
        contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
        document.getElementById('connectBtn').textContent = "Bağlandı";
        document.getElementById('statusDot').classList.add('connected');
        document.getElementById('noteInput').disabled = false;
        document.getElementById('saveBtn').disabled = false;
        loadNotes();
    }

    async function saveNote() {
        const content = document.getElementById('noteInput').value;
        const tx = await contract.addNote(content);
        await tx.wait();
        loadNotes();
    }

    async function loadNotes() {
        const notes = await contract.getNotes();
        const list = document.getElementById('notesList');
        list.innerHTML = notes.map(n => `<div class="note-card">${n.content}</div>`).join('');
    }
</script>
</body>
</html>
