<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="talentapp:project_verification" content="d2b378511f24aff0b4198f3e662c047556ee09b9aff791bde989c2bd23c89ef18f96f52ffce2b83675dde22cffd11c50e82eb9831">
    <title>BaseNote</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <style>
        body { background: #0a0a0f; color: #fff; font-family: sans-serif; padding: 20px; }
        .wrap { max-width: 600px; margin: 0 auto; }
        .note-card { background: #1a1a24; padding: 15px; border-radius: 8px; margin-top: 10px; border: 1px solid #333; }
    </style>
</head>
<body>
<div class="wrap">
    <h1>BaseNote</h1>
    <div id="status">Cüzdan bağlı değil</div>
    <textarea id="noteInput" style="width:100%; height:80px; background:#111; color:white;"></textarea>
    <button onclick="saveNote()">Blockchain'e Kaydet</button>
    <div id="notesList"></div>
</div>

<script>
    // Remix'ten bulduğun ADRESİ BURAYA YAZ:
    const CONTRACT_ADDRESS = "BURAYA_ADRESI_YAPISTIR"; 
    const ABI = [
        "function addNote(string memory _text) public",
        "function getNotes(address _user) public view returns (tuple(string text, uint256 timestamp)[])"
    ];

    async function saveNote() {
        if (!window.ethereum) return alert("MetaMask yok");
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        const signer = provider.getSigner();
        const contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
        
        const tx = await contract.addNote(document.getElementById('noteInput').value);
        await tx.wait();
        loadNotes();
    }

    async function loadNotes() {
        const accounts = await window.ethereum.request({ method: 'eth_accounts' });
        if(accounts.length === 0) return;
        
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        const contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, provider);
        const notes = await contract.getNotes(accounts[0]);
        
        document.getElementById('status').textContent = "Bağlı: " + accounts[0];
        document.getElementById('notesList').innerHTML = notes.map(n => `<div class="note-card">${n.text}</div>`).join('');
    }
    
    loadNotes();
</script>
</body>
</html>
