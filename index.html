<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="talentapp:project_verification" content="d2b378511f24aff0b4198f3e662c047556ee09b9aff791bde989c2bd23c89ef18f96f52ffce2b83675dde22cffd11c50e82eb9831">
    <title>BaseNote — On-chain Not Defteri</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0a0a0f; --bg2: #111118; --bg3: #1a1a24;
            --border: rgba(255,255,255,0.08); --accent: #6c63ff;
            --accent2: #a78bfa; --text: #e8e8f0; --muted: #666680;
            --green: #34d399;
        }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding: 40px 20px; }
        .wrap { max-width: 600px; margin: 0 auto; }
        .composer { background: var(--bg2); border: 1px solid var(--border); padding: 20px; border-radius: 16px; margin-bottom: 20px; }
        textarea { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 14px; color: white; min-height: 100px; outline: none; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; background: var(--accent); color: white; margin-top: 10px; }
        .note-card { background: var(--bg2); border: 1px solid var(--border); padding: 15px; border-radius: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="wrap">
    <h1>BaseNote</h1>
    <div class="composer">
        <textarea id="noteInput" placeholder="Notunu yaz..."></textarea>
        <button class="btn" id="saveBtn" onclick="saveNote()">Blockchain'e Kaydet</button>
    </div>
    <div id="notesList"></div>
</div>

<script>
    // GÜNCEL CONTRACT ADRESİN
    const CONTRACT_ADDRESS = "0xeC894Bb0Ad54e30690DcAF4C695Eca323b746e05";
    const ABI = [
        "function addNote(string memory _text) public",
        "function getNotes(address _user) public view returns (tuple(string text, uint256 timestamp)[])"
    ];

    let signer, contract;

    async function connectWallet() {
        await window.ethereum.request({ method: 'eth_requestAccounts' });
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        signer = provider.getSigner();
        contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
        loadNotes();
    }

    async function saveNote() {
        const text = document.getElementById('noteInput').value;
        const tx = await contract.addNote(text);
        await tx.wait();
        loadNotes();
    }

    async function loadNotes() {
        const userAddr = await signer.getAddress();
        const notes = await contract.getNotes(userAddr);
        document.getElementById('notesList').innerHTML = notes.map(n => 
            `<div class="note-card">${n.text}</div>`
        ).join('');
    }

    connectWallet();
</script>
</body>
</html>
